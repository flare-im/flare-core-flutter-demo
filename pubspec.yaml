name: flare_im
description: Production-ready Flutter IM application powered by flare_core_flutter_sdk.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flare_core_flutter_sdk:
    path: ../../packages/flare-core-flutter-sdk
  flare_call_kit:
    path: packages/flare_call_kit_stub

  flutter_riverpod: ^2.6.1
  flutter_hooks: ^0.21.2
  hooks_riverpod: ^2.6.1
  go_router: ^16.3.0
  event_bus: ^2.0.1

  freezed_annotation: ^2.4.4
  equatable: ^2.0.7

  cached_network_image: ^3.4.1
  flutter_slidable: ^4.0.3
  url_launcher: ^6.3.2
  video_player: ^2.10.1
  record: ^6.1.2
  # Flutter 3.44 removed ExtendSelectionByPageIntent; use upstream compat branch until pub release.
  # https://github.com/fluttercandies/extended_text_field/pull/271
  extended_text_field:
    git:
      url: https://github.com/fluttercandies/extended_text_field.git
      ref: e433ae1aac3daeecc63a7a6d000e9926a4c57cfe

  shared_preferences: ^2.5.5
  path_provider: ^2.1.5
  image_picker: ^1.2.1
  file_picker: ^8.3.7
  geocoding: ^4.0.0
  geolocator: ^14.0.2
  flutter_map: ^8.3.0
  latlong2: ^0.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.5.4
  freezed: ^2.5.8

flutter:
  uses-material-design: true
  assets:
    - assets/config/app_defaults.json
    - assets/emoji-locales.json
    - assets/emoji/manifest.json
    - assets/emoji/
    - assets/stickers/manifest.json
    - assets/stickers/compressed/
